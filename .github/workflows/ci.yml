name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# Cancel in-progress runs for the same branch (never cancel main)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ── 1. Secret Detection ────────────────────────────────────────────────────
  secret-scan:
    name: "Secret Scan · Gitleaks"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history — secrets hidden in old commits are caught too
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE required only for private repos on the paid plan

  # ── 2. Python: Lint + Format ───────────────────────────────────────────────
  python-lint:
    name: "Python · Lint (Ruff)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-ruff-${{ hashFiles('requirements.txt') }}
      - run: pip install "ruff==0.7.4"
      - name: Lint (annotate GitHub diff)
        run: ruff check backend/ --output-format=github
      - name: Format check
        run: ruff format --check backend/

  # ── 3. Python: Type Check ─────────────────────────────────────────────────
  python-typecheck:
    name: "Python · Type Check (mypy)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-mypy-${{ hashFiles('requirements.txt') }}
      - run: pip install "mypy==1.13.0" types-requests
      - name: mypy
        run: |
          mypy backend/ \
            --ignore-missing-imports \
            --no-strict-optional \
            --python-version 3.11 \
            --pretty

  # ── 4. Python: SAST (Bandit) ──────────────────────────────────────────────
  python-sast:
    name: "Python · SAST (Bandit)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install "bandit[toml]==1.8.3"
      - name: Report medium+ findings (advisory)
        run: bandit -r backend/ -ll -ii --format txt --exit-zero
      - name: Fail on HIGH severity
        run: bandit -r backend/ -lll --format json --output bandit-high.json
      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-high.json
          retention-days: 7

  # ── 5. Python: Dependency Vulnerability Audit ──────────────────────────────
  python-deps:
    name: "Python · Dependency Audit (pip-audit)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install pip-audit
      - name: Audit requirements
        run: pip-audit -r requirements.txt --format markdown

  # ── 6. Frontend: Build Validation (Vite) ──────────────────────────────────
  frontend-build:
    name: "Frontend · Build (Vite)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package.json
      - name: Install
        working-directory: frontend
        run: npm install
      - name: Build
        working-directory: frontend
        run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ── 7. Frontend: Dependency Audit ─────────────────────────────────────────
  frontend-deps:
    name: "Frontend · Dependency Audit (npm audit)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install
        working-directory: frontend
        run: npm install
      - name: Audit
        working-directory: frontend
        run: npm audit --audit-level=high

  # ── 8. Dockerfile: Lint (Hadolint) ────────────────────────────────────────
  dockerfile-lint:
    name: "Docker · Hadolint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint backend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile.backend
          # DL3008 — apt pin versions: acceptable in project Dockerfiles
          ignore: DL3008
      - name: Lint frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile.frontend

  # ── 9. Docker: Build Validation ───────────────────────────────────────────
  docker-build:
    name: "Docker · Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: false
          tags: interviewiq-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── CI Gate ────────────────────────────────────────────────────────────────
  # Single required status check for branch protection rules.
  # All jobs above must pass before a PR can be merged.
  ci-gate:
    name: "CI Gate"
    runs-on: ubuntu-latest
    needs:
      - secret-scan
      - python-lint
      - python-typecheck
      - python-sast
      - python-deps
      - frontend-build
      - frontend-deps
      - dockerfile-lint
      - docker-build
    if: always()
    steps:
      - name: Verify all checks passed
        env:
          RESULTS: ${{ toJSON(needs.*.result) }}
        run: |
          echo "Job results: $RESULTS"
          if echo "$RESULTS" | grep -qE '"(failure|cancelled)"'; then
            echo "::error::One or more required checks failed — merge blocked."
            exit 1
          fi
          echo "All checks passed."
