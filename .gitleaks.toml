title = "InterviewIQ Gitleaks Config"

[extend]
# Inherit the full default ruleset and only add allowlist overrides.
useDefault = true

# Global allowlist — gitleaks v8 uses a single [allowlist] section.
[allowlist]
description = "Known safe patterns and documentation files"
regexes = [
  # docker-compose.yml passes the key via env var reference, not a real value
  '''ANTHROPIC_API_KEY=\$\{ANTHROPIC_API_KEY\}''',
  '''sk-ant-placeholder''',
  '''your[_-]api[_-]key[_-]here''',
  '''<YOUR_API_KEY>''',
]
paths = [
  '''README\.md''',
  '''DOCUMENTATION\.md''',
  '''CLAUDE\.md''',
  '''\.github/pull_request_template\.md''',
]
