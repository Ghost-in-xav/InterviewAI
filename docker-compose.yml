services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: interviewiq-backend
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: interviewiq-frontend
    ports:
      - "5173:5173"
    environment:
      # The browser talks to the backend directly, so use localhost on the host.
      - VITE_WS_URL=ws://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
